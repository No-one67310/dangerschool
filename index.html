<!DOCTYPE html>
<html>
<head>
    <title>SYSTEM BREACHED</title>
    <style>
        body { background-color: black; color: #0f0; font-family: monospace; text-align: center; padding-top: 50px; overflow: hidden; }
        .matrix { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.3; }
        .hacker-img { width: 300px; border: 2px solid #0f0; box-shadow: 0 0 20px #0f0; border-radius: 10px; }
        .content { position: relative; z-index: 1; }
        h1 { font-size: 20px; text-shadow: 0 0 10px #0f0; }
        .warning { color: red; font-weight: bold; font-size: 25px; }
    </style>
</head>
<body>
    <div class="content">
        <img src="https://i.pinimg.com/originals/0b/21/9f/0b219f91b508342ff91c9ad24091a153.jpg" class="hacker-img">
        <h1 class="warning">SYSTEM HACKED BY ZHEWAR</h1>
        <div style="font-size: 18px; padding: 20px; line-height: 1.6;">
            <p>Rule Number 1: Never trust a friend.</p>
            <p>But in our cybersecurity and hack world, we call this a link or file.</p>
            <p>Especially right now, you are hacked by <b>ZHEWAR</b> because you broke Rule 1!</p>
        </div>
    </div>
    <canvas id="matrix" class="matrix"></canvas>
    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0f0";
            ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = letters[Math.floor(Math.random() * letters.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(draw, 33);
    </script>
</body>
</html>
