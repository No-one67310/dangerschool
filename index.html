<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>DANGER SCHOOL</title>
    <style>
        body { 
            background-color: black; 
            color: red; 
            text-align: center; 
            font-family: 'Courier New', Courier, monospace; 
            padding: 20px;
            overflow-x: hidden;
        }

        h1 { 
            font-size: 50px; 
            text-shadow: 5px 5px 20px #800; 
            animation: glitch 0.2s infinite;
            color: #ff0000;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            25% { transform: translate(-3px, 3px); color: #800; }
            50% { transform: translate(3px, -3px); }
            75% { transform: translate(-3px, -3px); color: #f00; }
            100% { transform: translate(0); }
        }

        /* فلتەری خوێناوی بۆ وێنەکە */
        .bloody-img { 
            width: 90%; 
            max-width: 500px; 
            border: 5px solid #600; 
            margin: 20px 0; 
            /* ئەم فلتەرانە وێنەکە خوێناوی دەکەن */
            filter: sepia(1) saturate(5) hue-rotate(-50deg) brightness(0.7) contrast(1.5);
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
            transition: 0.3s;
        }

        .bloody-img:hover {
            filter: sepia(1) saturate(10) hue-rotate(-50deg) brightness(0.5);
        }

        p { font-size: 22px; line-height: 1.6; text-shadow: 1px 1px 5px black; }

        .warning { 
            font-weight: bold; 
            font-size: 28px; 
            margin-top: 20px; 
            color: #ff0000;
            animation: blink 0.5s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.2; transform: scale(1.1); }
